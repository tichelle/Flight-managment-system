{% extends 'admin/layout.html' %}
{% block title %}Manage Airlines{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4>Airlines</h4>
  <a href="{{ url_for('admin.new_airline') }}" class="btn btn-primary btn-lg"><i class="fas fa-plus me-2"></i>Add Airline</a>
</div>
<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead><tr><th>#</th><th>Name</th><th>Country</th><th>Logo</th><th>Actions</th></tr></thead>
      <tbody>
        {% for airline in airlines %}
        <tr>
          <td>{{ airline.id }}</td>
          <td>{{ airline.name }}</td>
          <td>{{ airline.country }}</td>
          <td>{{ airline.logo or 'N/A' }}</td>
          <td>
            <a href="{{ url_for('admin.edit_airline', airline_id=airline.id) }}" class="btn btn-sm btn-outline-secondary">Edit</a>
            <form method="post" action="{{ url_for('admin.delete_airline', airline_id=airline.id) }}" class="d-inline-block" onsubmit="return confirm('Delete this airline?');">
              <button class="btn btn-sm btn-danger">Delete</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
